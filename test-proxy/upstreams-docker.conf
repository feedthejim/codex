# Backends for the CONTAINER run path (the `nginx` service in compose.yaml).
# From inside the compose network:
#   - Codex runs natively on the host  -> host.docker.internal (needs the
#     extra_hosts host-gateway mapping the compose service sets for Linux;
#     automatic on Docker Desktop).
#   - tinyauth is a sibling service     -> its service name + INTERNAL port
#     3000 (not the published 3232).
# The native path uses upstreams-native.conf instead.
upstream codex_backend {
    server host.docker.internal:9810;
}
upstream tinyauth_backend {
    server tinyauth:3000;
}
