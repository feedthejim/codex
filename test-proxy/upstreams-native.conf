# Backends for the NATIVE run path (bin/run-test-proxy.sh). nginx runs on
# the host, so both backends are reachable on localhost: Codex from
# `make dev`, tinyauth on its published compose port. The container path
# uses upstreams-docker.conf instead — that is the only difference between
# the two.
upstream codex_backend {
    server 127.0.0.1:9810;
}
upstream tinyauth_backend {
    server 127.0.0.1:3232;
}
