# WebSocket upgrade map, shared by the native and container nginx paths.
# Connection is "upgrade" only when the client sent an Upgrade header, else
# "close" — so normal requests aren't proxied as malformed upgrades.
# server.conf and forwardauth.conf reference $connection_upgrade.
# http{} context (native: included from nginx.conf; container: mounted into
# conf.d, which the stock image includes inside http{}).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
