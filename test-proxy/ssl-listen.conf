# SSL + HTTP/3 listeners for the NATIVE run path (bin/run-test-proxy.sh),
# included from server.conf's server{} block. Kept for the original subpath
# TLS/HTTP3 testing this directory was built for. The container path mounts
# ssl-listen-none.conf over this include instead — the SSO harness needs no
# TLS, and QUIC/cert wiring inside a container is avoidable complexity.
listen 8443 ssl default_server;
listen [::]:8443 ssl default_server;
listen 8443 quic reuseport default_server;
listen [::]:8443 quic reuseport default_server;
include ssl.conf;
