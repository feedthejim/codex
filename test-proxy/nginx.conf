# Standalone wrapper so default.conf's server block runs without the
# linuxserver container. Launch via run-test-proxy.sh (nginx -p test-proxy).
worker_processes 1;
daemon off;
pid tmp/nginx.pid;
error_log /dev/stderr info;
events { worker_connections 1024; }
http {
    default_type application/octet-stream;
    access_log /dev/stdout;
    # WebSocket upgrade map, shared with the container path.
    include connection-upgrade.conf;
    # Native backends (localhost); the container path defines these same
    # upstream names differently in upstreams-docker.conf.
    include upstreams-native.conf;
    client_body_temp_path tmp/client;
    proxy_temp_path tmp/proxy;
    fastcgi_temp_path tmp/fastcgi;
    uwsgi_temp_path tmp/uwsgi;
    scgi_temp_path tmp/scgi;
    include server.conf;
    # Codex gated behind tinyauth forward-auth on :8081 (SSO testing;
    # needs the compose stack from compose.yaml running).
    include forwardauth.conf;
}
