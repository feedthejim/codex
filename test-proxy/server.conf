# nginx server block for local reverse-proxy testing of a url_path_prefix
# (subpath) deployment. Shared by BOTH run paths:
#   - native:    bin/run-test-proxy.sh  (nginx -p test-proxy)
#   - container: the `nginx` service in compose.yaml
# The only native-vs-container difference — where the Codex backend lives —
# is abstracted into the `codex_backend` upstream, defined in
# upstreams-native.conf / upstreams-docker.conf. Edit ports or routing here
# and both paths pick it up. Adapted from the linuxserver.io nginx sample;
# ports are remapped to 8080/8443 to run unprivileged.

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    # SSL/QUIC listeners: present natively (certs on disk), empty in the
    # container (the SSO harness is plain-HTTP only). See ssl-listen.conf.
    include ssl-listen.conf;

    server_name _;

    access_log /dev/stdout;
    error_log /dev/stderr;

    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # $http_host (the requested host INCLUDING port), not $server_name (the
    # "_" catch-all → DisallowedHost) and not $host (which strips the port).
    # codex has USE_X_FORWARDED_HOST=True, so this is what Django's
    # build_absolute_uri uses — the port must be present or the OIDC
    # redirect_uri comes out as http://localhost/... and fails to match.
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    # proxy_set_header  X-Forwarded-Ssl   on;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Scheme $scheme;
    # proxy_set_header Remote-User 'admin';
    # WS — $connection_upgrade is mapped from $http_upgrade in nginx.conf so
    # only real WebSocket requests carry "Connection: upgrade".
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/js text/xml text/javascript
    application/javascript application/json application/xml image/svg+xml;


    # Keep proxy_set_header OUT of this location: defining even one here makes
    # nginx drop every proxy_set_header inherited from the server block above
    # (incl. the WebSocket Upgrade/Connection headers), breaking ws proxying.
    location / {
        proxy_pass http://codex_backend;
    }
}
