# nginx server block: Codex behind tinyauth forward-auth (Remote-User SSO).
# Shared by the native (bin/run-test-proxy.sh) and container (compose.yaml
# `nginx` service) run paths; the backends differ only in the
# codex_backend / tinyauth_backend upstreams (upstreams-*.conf).
#
# Listens on 8081. Every request is authorized against tinyauth via
# auth_request; unauthenticated browsers are redirected to the tinyauth
# login page (http://localhost:3232, the published port the browser hits)
# and come back with a session cookie (cookies are per-host, not per-port,
# so the tinyauth session on localhost applies here too).
#
# Run Codex with CODEX_AUTH_REMOTE_USER=1 to accept the injected header,
# then browse http://localhost:8081/codex/
#
# Port 8080 (server.conf) stays ungated on purpose: with remote_user
# enabled it demonstrates exactly the spoofable misconfiguration the
# README warns about — see test-proxy/README.md.

server {
    listen 8081;
    listen [::]:8081;

    server_name _;

    access_log /dev/stdout;
    error_log /dev/stderr;

    # The internal authorization subrequest nginx makes for every request.
    location = /tinyauth-auth {
        internal;
        proxy_pass http://tinyauth_backend/api/auth/nginx;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header x-forwarded-proto $scheme;
        proxy_set_header x-forwarded-host $http_host;
        proxy_set_header x-forwarded-uri $request_uri;
    }

    # Browsers that fail the subrequest get bounced to the login page.
    location @tinyauth_login {
        return 302 http://localhost:3232/login?redirect_uri=$scheme://$http_host$request_uri;
    }

    location / {
        auth_request /tinyauth-auth;
        error_page 401 = @tinyauth_login;
        auth_request_set $tinyauth_user $upstream_http_remote_user;

        # NOTE: nginx drops server-level proxy_set_header inheritance the
        # moment a location defines its own, so EVERY header lives here.
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Include the port (see server.conf) so Django builds correct
        # absolute URLs behind this non-standard-port proxy.
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Scheme $scheme;
        # The authenticated identity — OVERRIDES anything the client sent,
        # which is what makes header auth safe behind this gate.
        proxy_set_header Remote-User $tinyauth_user;
        # WebSockets (Codex live updates); the auth subrequest still runs.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_pass http://codex_backend;
    }
}
