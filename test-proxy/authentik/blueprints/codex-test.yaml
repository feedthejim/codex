# authentik blueprint: everything the Codex OIDC manual test needs.
#
# Mounted into the authentik containers at /blueprints/custom/ (see
# ../../compose.yaml); authentik discovers and applies it automatically at
# startup and re-applies on file change (and every 60 minutes).
#
# Creates:
#   groups        codex-admins, readers
#   users         testuser  / insecure-test-password   (readers)
#                 testadmin / insecure-test-password   (readers, codex-admins)
#   OIDC client   client id  codex-test
#                 secret     insecure-codex-test-secret
#                 issuer     http://localhost:9010/application/o/codex-test/
#
# Redirect URIs cover Codex behind the test-proxy nginx (8080) and direct
# (9810), each with and without a /codex url_path_prefix.
#
# All credentials here are public throwaway test data for this local
# harness only.
version: 1
metadata:
  name: codex-test
  labels:
    blueprints.goauthentik.io/description: Codex SSO manual-test fixtures
entries:
  - model: authentik_core.group
    id: group-codex-admins
    identifiers:
      name: codex-admins
    state: present
  - model: authentik_core.group
    id: group-readers
    identifiers:
      name: readers
    state: present

  - model: authentik_core.user
    identifiers:
      username: testuser
    state: present
    attrs:
      name: Test User
      email: testuser@example.com
      password: insecure-test-password
      is_active: true
      groups:
        - !KeyOf group-readers

  - model: authentik_core.user
    identifiers:
      username: testadmin
    state: present
    attrs:
      name: Test Admin
      email: testadmin@example.com
      password: insecure-test-password
      is_active: true
      groups:
        - !KeyOf group-readers
        - !KeyOf group-codex-admins

  - model: authentik_providers_oauth2.oauth2provider
    id: codex-test-provider
    identifiers:
      name: codex-test-provider
    state: present
    attrs:
      name: codex-test-provider
      client_type: confidential
      client_id: codex-test
      client_secret: insecure-codex-test-secret
      # authentik 2026.x added an explicit grant_types field that defaults
      # to an EMPTY list in blueprints — without this the authorize step
      # fails with "Invalid grant_type for provider" and the callback comes
      # back as error=invalid_request. authorization_code is what Codex
      # uses; refresh_token matches the authentik UI default.
      grant_types:
        - authorization_code
        - refresh_token
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, default-provider-authorization-implicit-consent],
        ]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [
          authentik_crypto.certificatekeypair,
          [name, authentik Self-signed Certificate],
        ]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:8080/codex/sso/oidc/login/callback/
        - matching_mode: strict
          url: http://localhost:8080/sso/oidc/login/callback/
        - matching_mode: strict
          url: http://localhost:9810/codex/sso/oidc/login/callback/
        - matching_mode: strict
          url: http://localhost:9810/sso/oidc/login/callback/

  - model: authentik_core.application
    identifiers:
      slug: codex-test
    state: present
    attrs:
      name: Codex Test
      slug: codex-test
      provider: !KeyOf codex-test-provider
      policy_engine_mode: any
